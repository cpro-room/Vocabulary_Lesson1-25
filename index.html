<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>N5 ちょうかい れんしゅう①</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    padding: 16px;
    font-family: sans-serif;
    background: #f7f7f7;
    color: #222;
    text-align: center;
  }

  h1 { font-size: 1.8rem; margin-bottom: 20px; }

  #quizArea { max-width: 500px; margin: 0 auto; }

  #questionNumber {
    font-size: 1.1rem;
    margin-bottom: 10px;
    color: #555;
  }

#questionBox {
  font-size: 1.3rem;
  line-height: 1.4;
  background: white;
  padding: 16px 16px;
  border-radius: 14px;
  margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  height: 80px;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  text-align: left;
  padding-left: 1em; 
}

  #optionsBox {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option {
    width: 100%;
    padding: 12px 12px;
    font-size: 1.4rem;
    border: none;
    border-radius: 14px;
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    cursor: pointer;
    text-align: left;
    padding-left: 1em; 
  }

  .correct { font-size: 3rem; color: red; font-weight: bold; }
  .wrong { font-size: 3rem; color: blue; font-weight: bold; }

#judge {
  margin-top: 0;
  margin-bottom: 2px;
}

#nextBtn {
  display: block;
  margin: 6px auto 0;
  padding: 10px 18px;
  width: auto;
  font-size: 1.1rem;
  border: none;
  border-radius: 10px;
  background: #00c851;
  color: white;
  cursor: pointer;
}

  #result {
    margin-top: 30px;
    text-align: left;
    background: white;
    padding: 16px;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

 #questionBox.finalMode {
  display: block;
  height: auto;
  padding: 20px 10px;
  text-align: center;
}

.finalTitle,
.finalScore {
  text-align: center;
  line-height: 1.2;
}
.finalScore {
  margin-top: 4px; /* ここで2行の間隔調整 */
}
</style>
</head>

<body>

<h1>N5 ちょうかい れんしゅう①</h1>

<div id="quizArea">
  <div id="questionNumber"></div>

  <div id="speakerArea" style="margin-bottom:10px;">
    <button onclick="playAudio()" style="font-size:2.5rem;">🔊</button>
  </div>

  <div id="questionBox"></div>

  <div id="optionsBox"></div>

  <div id="judge"></div>

  <button id="nextBtn" onclick="nextQuestion()">つぎへ</button>

  <div id="result"></div>
</div>

<script src="questions.js"></script>

<script>

let quizList = [];
let current = 0;
let answering = false;
let currentAudio = "";
let correctCount = 0;

startQuiz(questions);

function startQuiz(list) {
  quizList = shuffle([...list]);
  current = 0;
  correctCount = 0;
  showQuestion();
  document.getElementById("speakerArea").style.display = "block";
}

function showQuestion() {
  if (current >= quizList.length) {

    document.getElementById("speakerArea").style.display = "none";
    document.getElementById("questionNumber").textContent = "";

    const box = document.getElementById("questionBox");

    // ★通常レイアウト解除
    box.classList.add("finalMode");

    box.innerHTML =
      `<div class="finalTitle">おわり！</div>
       <div class="finalScore">${correctCount}/${quizList.length} てん</div>`;

    document.getElementById("optionsBox").innerHTML = "";
    document.getElementById("judge").innerHTML = "";
    document.getElementById("nextBtn").style.display = "none";

    currentAudio = "";
    return;
  }

  const q = quizList[current];

  document.getElementById("questionNumber").textContent =
    `もんだい ${current + 1} / ${quizList.length}`;

  const box = document.getElementById("questionBox");
  box.classList.remove("finalMode"); // ★通常に戻す

  box.textContent = "";
  document.getElementById("judge").innerHTML = "";
  document.getElementById("nextBtn").style.display = "none";

  currentAudio = `audio/${q.no}.mp3`;

  const optBox = document.getElementById("optionsBox");
  optBox.innerHTML = "";

  shuffle([...q.options]).forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt);
    optBox.appendChild(btn);
  });
}

let audioPlayer = null;

function playAudio() {
  if (!currentAudio) return;

  if(audioPlayer){
    audioPlayer.pause();
  }

  audioPlayer = new Audio(currentAudio);
  audioPlayer.play();
}

function checkAnswer(choice) {
  if (answering) return;
  answering = true;

  const buttons = document.querySelectorAll(".option");

  const q = quizList[current];
  const correct = (choice === q.answer);

  if (correct) {
    correctCount++;
  }

  // ★全ボタンを無効化（ここが重要）
  buttons.forEach(btn => {
    btn.disabled = true;
  });

  document.getElementById("judge").innerHTML =
    correct ? "<span class='correct'>○</span>" : "<span class='wrong'>×</span>";

  document.getElementById("questionBox").innerHTML =
    `<span style="color:blue">${q.script}</span>`;

  document.getElementById("nextBtn").style.display = "block";

  answering = false;
}

function nextQuestion() {
  current++;
  showQuestion();
}

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

</script>

</body>
</html>
